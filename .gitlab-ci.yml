default:
  tags:
    - linux

stages:
  - lint
  - test
  - build
  - scan
  - update-manifest

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  DOCKER_TLS_CERTDIR: "/certs"

# Optimization: Cache node_modules berdasarkan lockfile masing-masing
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/ # Backend
    - frontend/node_modules/ # Frontend

# --- STAGE: LINT ---
# Menjalankan ESLint (skrip default dari react-app)
lint-frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm install
    - npx eslint src/**/*.js
  allow_failure: true # Jangan hentikan pipeline hanya karena warning style

# --- STAGE: TEST ---
test-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm install
    # CI=true sangat penting agar react-scripts tidak masuk ke watch mode
    - CI=true npm test 
  rules:
    - changes:
        - frontend/**/*

test-backend:
  stage: test
  image: node:20-alpine
  script:
    # - cd backend
    - npm install
    # Menggunakan '|| true' jika script test belum didefinisikan di package.json
    - npm test || echo "Warning: No tests defined for backend"
  rules:
    - changes:
        - backend/**/*

# --- STAGE: BUILD & PUSH ---
build-apps:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    # Build Backend
    - docker build -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE
    # Build Frontend
    - docker build -t $FRONTEND_IMAGE ./frontend
    - docker push $FRONTEND_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- STAGE: SCAN ---
container-scan:
  stage: scan
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Scan untuk melihat celah keamanan kritikal sebelum masuk ke K8s
    - trivy image --severity CRITICAL --exit-code 0 $BACKEND_IMAGE
    - trivy image --severity CRITICAL --exit-code 0 $FRONTEND_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

