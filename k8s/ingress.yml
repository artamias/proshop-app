apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proshop-ingress
  namespace: proshop
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000